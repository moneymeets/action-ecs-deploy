name: Get image URI
description: Get image uri from AWS ECR

inputs:
  ecr_repository:
    description: ECR repository to pull image from
    required: true
  aws_region:
    description: AWS region
    required: true
  allow_feature_branch_deployment:
    description: Allow deployment from features
    required: false

outputs:
  image-uri:
    description: "Image URI"
    value: ${{ steps.get-image-uri.outputs.image-uri }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Get Image URI
      shell: bash
      id: get-image-uri
      run: |
        if [[ "${{ inputs.allow_feature_branch_deployment }}" == "false" ]]; then
          imageTag=master-${{ github.sha }}
        else
          imageTag=$(echo ${{ github.ref_name }} | awk '{print tolower($0)}' | sed -e 's|/|-|g')
        fi
        IMAGE_TAGS=$(
          aws ecr describe-images \
          --repository-name ${{ inputs.ecr_repository }} \
          --image-ids imageTag="${imageTag}" \
          --query 'imageDetails[*].imageTags[0]' \
          --output json \
          --region ${{ inputs.aws_region }}
        )
        REPOSITORY_URI=$(
          aws ecr describe-repositories \
          --repository-name ${{ inputs.ecr_repository }} \
          --query 'repositories[0].repositoryUri' \
          --output text \
          --region ${{ inputs.aws_region }}
        )
        IMAGE_URI=$(jq --arg uri "${REPOSITORY_URI}" '.[] | ($uri + ":" + .)' <<< "${IMAGE_TAGS}")
        echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
